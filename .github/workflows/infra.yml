name: infra

# Infra CI/CD for the Snowflake RBAC + governance stack.
#   PR  (touching infra/**)        -> config-drift check + terraform plan, plan posted as a PR comment
#   push to main (touching infra/**) -> terraform apply, then re-bind the PII
#                                      tag->policy per env (apply_pii_tags.py),
#                                      which every apply drops.
# Auth: OG_DEPLOYER_SVC key-pair (Snowflake) + storage account key (tfstate backend).

on:
  pull_request:
    paths: ['infra/**', '.github/workflows/infra.yml']
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/infra.yml']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
  TF_VAR_SF_ORGANIZATION_NAME: ${{ secrets.SF_ORGANIZATION_NAME }}
  TF_VAR_SF_ACCOUNT_NAME: ${{ secrets.SF_ACCOUNT_NAME }}
  TF_VAR_SF_USERNAME: ${{ secrets.SF_USERNAME }}
  TF_VAR_SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
  TF_VAR_SF_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}

jobs:
  # ── PR: validate config↔JSON sync, then plan and post it as a comment ───────
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Config-drift check (CSV -> resources/*.json)
        run: |
          python infra/sync_config.py
          if ! git diff --quiet -- infra/resources/infrastructure; then
            echo "::error::config CSVs are out of sync with resources/infrastructure/*.json — run 'python infra/sync_config.py' and commit."
            git --no-pager diff --stat -- infra/resources/infrastructure
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.8' }

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -input=false -no-color -lock-timeout=120s | tee plan.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('infra/terraform/plan.txt', 'utf8').trim();
            if (plan.length > 60000) plan = '...(truncated)...\n' + plan.slice(-60000);
            const body = [
              '#### 🏗️ Terraform Plan — infra',
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```',
              plan,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

  # ── main: apply, then re-bind PII masking (tag->policy) for each active env ──
  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install python deps
        run: pip install --quiet snowflake-connector-python cryptography

      - name: Config-drift check (CSV -> resources/*.json)
        run: |
          python infra/sync_config.py
          if ! git diff --quiet -- infra/resources/infrastructure; then
            echo "::error::config out of sync — run 'python infra/sync_config.py' and commit."
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.8' }

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve -no-color -lock-timeout=120s

      # A terraform apply DROPS the tag->masking-policy binding, so it must be
      # re-established after every apply — for each ACTIVE environment.
      - name: Re-bind PII masking (tag -> policy) per env
        env:
          SF_ORGANIZATION_NAME: ${{ secrets.SF_ORGANIZATION_NAME }}
          SF_ACCOUNT_NAME: ${{ secrets.SF_ACCOUNT_NAME }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
        run: |
          printf '%s' "$SF_PRIVATE_KEY" > "$RUNNER_TEMP/deployer.p8"
          export SF_PRIVATE_KEY_PATH="$RUNNER_TEMP/deployer.p8"
          envs=$(python -c "import json; print(' '.join(v['env'] for v in json.load(open('infra/resources/infrastructure/environments.json'))['environments'].values() if v['is_active']))")
          echo "Active envs: $envs"
          for e in $envs; do
            echo "== apply_pii_tags.py --env $e =="
            python infra/apply_pii_tags.py --env "$e"
          done
          rm -f "$RUNNER_TEMP/deployer.p8"
